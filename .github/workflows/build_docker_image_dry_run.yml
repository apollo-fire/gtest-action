---
name: Dry run Docker Container Build

on:
  workflow_dispatch:
  merge_group:

  pull_request_target:
    branches: ["dependabot/**"]

  pull_request:
    types: [opened, synchronize, edited]

permissions: read-all

jobs:
  dry-run-docker-build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: "Login to github docker registry"
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry Run Build
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          load: true
          tags: gtest-action:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: GTest Action without existing CMake file
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/working_unittest_project" "" "unset" "0"

      - name: GTest Action with existing CMake file
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/working_unittest_project_with_existing_cmake" "" "unset" "0"

      - name: GTest Action with mix of project styles, with and without existing CMake file
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/working_unittest_project;test/working_unittest_project_with_existing_cmake" "" "unset" "0"

      - name: GTest Action building with j8 flag set
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/working_unittest_project" "" "8" "0"

      - name: GTest Action shuffle 10 times
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/working_unittest_project" "" "unset" "10"

      - name: GTest Action with passing unit tests
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/good_unit_tests" "test/good_unit_tests" "2" "1"

      - name: GTest Action with failing unit tests (expects failure)
        run: |
          has_failed=false
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/failing_unit_tests" "test/failing_unit_tests" "2" "1" || has_failed=true
          if [ "$has_failed" = false ]; then
            echo "Expected failure but tests passed"
            exit 1
          fi

      - name: GTest Action with mixture of passing and failing unit tests (expects failure)
        run: |
          has_failed=false
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/github/workspace" \
            -w /github/workspace \
            gtest-action:test \
            "test/good_unit_tests;test/failing_unit_tests" "." "2" "1" || has_failed=true
          if [ "$has_failed" = false ]; then
            echo "Expected failure but tests passed"
            exit 1
          fi
