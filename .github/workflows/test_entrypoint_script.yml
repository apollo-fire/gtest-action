---
name: Test detection of passing / failing unit tests

on:
  merge_group:

  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, edited]

permissions: read-all

jobs:
  test-passing-failing-tests:
    runs-on: ubuntu-latest
    name: Test Detection Of Passing / Failing Tests
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install vcpkg and GoogleTest
        run: |
          git clone --depth 1 --branch 2024.12.16 https://github.com/microsoft/vcpkg /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          /tmp/vcpkg/vcpkg install "gtest:x64-linux" --no-print-usage
          # libicu-dev is no longer needed: gtest is now provided by vcpkg, not built from Ubuntu sources
          sudo apt-get install -y gcovr valgrind --no-install-recommends
          echo "VCPKG_ROOT=/tmp/vcpkg" >> "$GITHUB_ENV"

      - name: Verify vcpkg setup
        run: |
          [ -n "$VCPKG_ROOT" ] || { echo "VCPKG_ROOT is not set"; exit 1; }
          [ -f "$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" ] || { echo "vcpkg toolchain file not found at $VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"; exit 1; }
          [ -d "$VCPKG_ROOT/installed/x64-linux/include/gtest" ] || { echo "gtest headers not installed via vcpkg at $VCPKG_ROOT/installed/x64-linux/include/gtest"; exit 1; }
          echo "vcpkg verified: VCPKG_ROOT=$VCPKG_ROOT, gtest headers present"

      - name: Check working unit tests with existing cmake file (find_package via vcpkg)
        run: |
          ./entrypoint.sh test/working_unittest_project_with_existing_cmake "" 2 0

      - name: Check working unit tests
        run: |
          cp CMakeLists.txt test/good_unit_tests/CMakeLists.txt
          ./entrypoint.sh test/good_unit_tests test/good_unit_tests 2 1

      - name: Check failing unit tests
        run: |
          cp CMakeLists.txt test/failing_unit_tests/CMakeLists.txt
          has_failed=false
          ./entrypoint.sh test/failing_unit_tests test/failing_unit_tests 2 1 || has_failed=true
          if [ "$has_failed" = false ]; then
              exit 1
          fi

      - name: Check mixture of passing and failing unit tests
        run: |
          has_failed=false
          projects="test/good_unit_tests;test/failing_unit_tests"
          ./entrypoint.sh "$projects" "." 2 1 || has_failed=true
          if [ "$has_failed" = false ]; then
              exit 1
          fi
